<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İzin Kartı</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e8eef5;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 48px;
    font-family: sans-serif;
  }
  .topbar {
    width: 100%; max-width: 380px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
    opacity: 0; animation: fadeUp 0.4s ease 0.05s forwards;
  }
  .topbar-label { font-family: monospace; font-size: 11px; color: #64748b; letter-spacing: 0.08em; text-transform: uppercase; }
  .status-pill {
    font-family: monospace; font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; padding: 3px 10px; border-radius: 20px; border: 1.5px solid currentColor;
  }
  .status-pill.bekliyor    { color: #b45309; background: rgba(254,243,199,0.7); }
  .status-pill.onaylandi   { color: #15803d; background: rgba(220,252,231,0.7); }
  .status-pill.reddedildi  { color: #b91c1c; background: rgba(254,226,226,0.7); }
  .status-pill.onaylanmadi { color: #b91c1c; background: rgba(254,226,226,0.7); }
  .card-wrap {
    width: 100%; max-width: 380px;
    opacity: 0; animation: fadeUp 0.5s ease 0.15s forwards;
  }
  #svg-container { width: 100%; filter: drop-shadow(0 20px 40px rgba(15,23,42,0.18)); }
  #svg-container svg { width: 100%; height: auto; display: block; }
  .actions {
    width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 10px; margin-top: 20px;
    opacity: 0; animation: fadeUp 0.5s ease 0.35s forwards;
  }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 20px; border-radius: 12px;
    font-family: sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; border: none;
    transition: transform 0.15s ease, opacity 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn:disabled { opacity: 0.6; cursor: default; }
  .btn-wa { background: #25D366; color: #fff; box-shadow: 0 4px 14px rgba(37,211,102,0.3); }
  .btn-dl { background: rgba(255,255,255,0.8); color: #0f172a; border: 1px solid rgba(226,232,240,0.9); box-shadow: 0 2px 8px rgba(15,23,42,0.06); }
  .hint { font-family: monospace; font-size: 10px; color: #94a3b8; text-align: center; line-height: 1.6; }
  #loading {
    position: fixed; inset: 0; background: #e8eef5;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; z-index: 100;
    transition: opacity 0.3s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spinner { width: 28px; height: 28px; border: 2px solid #cbd5e1; border-top-color: #64748b; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .loading-text { font-family: monospace; font-size: 11px; color: #94a3b8; }
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #0f172a; color: #f1f5f9;
    font-family: monospace; font-size: 12px;
    padding: 10px 18px; border-radius: 8px;
    transition: transform 0.3s ease;
    white-space: nowrap; z-index: 200;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <span class="loading-text">Kart hazırlanıyor...</span>
</div>
<div class="topbar">
  <span class="topbar-label">İzin Kartı</span>
  <span id="status-pill" class="status-pill">—</span>
</div>
<div class="card-wrap">
  <div id="svg-container"></div>
</div>
<div class="actions">
  <button class="btn btn-wa" id="btn-wa" onclick="shareWhatsApp()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
    WhatsApp'ta Paylaş
  </button>
  <button class="btn btn-dl" id="btn-dl" onclick="downloadPNG()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    PNG İndir
  </button>
  <p class="hint" id="hint-text">Paylaşmak için WhatsApp butonuna basın</p>
</div>
<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
function getParams() {
  var p = new URLSearchParams(location.search);
  return {
    id:        p.get('id')        || 'TLP-001',
    ad:        p.get('ad')        || 'Ad Soyad',
    izinTur:   p.get('izinTur')   || 'Yıllık İzin',
    sure:      p.get('sure')      || '3 gün',
    mintika:   p.get('mintika')   || '—',
    kurum:     p.get('kurum')     || '—',
    baslangic: p.get('baslangic') || '—',
    bitis:     p.get('bitis')     || '—',
    onayMes:   p.get('onayMes')   || 'Evet',
    durum:     (p.get('durum')    || 'bekliyor').toLowerCase().trim(),
  };
}

function enc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

var durumCfg = {
  bekliyor:    { warnFill:'rgba(254,249,195,0.9)', warnStroke:'rgba(250,204,21,0.6)',  iconFill:'#ca8a04', textFill:'#b45309', label:'ONAY BEKLİYOR' },
  onaylandi:   { warnFill:'rgba(220,252,231,0.9)', warnStroke:'rgba(34,197,94,0.6)',   iconFill:'#16a34a', textFill:'#15803d', label:'ONAYLANDI'     },
  reddedildi:  { warnFill:'rgba(254,226,226,0.9)', warnStroke:'rgba(239,68,68,0.6)',   iconFill:'#dc2626', textFill:'#b91c1c', label:'ONAYLANMADI'   },
  onaylanmadi: { warnFill:'rgba(254,226,226,0.9)', warnStroke:'rgba(239,68,68,0.6)',   iconFill:'#dc2626', textFill:'#b91c1c', label:'ONAYLANMADI'   },
};

function fieldRow(y, label, value, valueColor) {
  valueColor = valueColor || '#0f172a';
  return ""
    + "<rect x='30' y='" + y + "' width='300' height='50' rx='8' fill='rgba(255,255,255,0.78)' stroke='rgba(226,232,240,0.85)' stroke-width='1'/>"
    + "<text x='44' y='" + (y+16) + "' fill='#94a3b8' font-family='sans-serif' font-size='9' letter-spacing='0.5'>" + enc(label) + "</text>"
    + "<text x='44' y='" + (y+36) + "' fill='" + valueColor + "' font-family='sans-serif' font-weight='700' font-size='14'>" + enc(value) + "</text>";
}

function buildSVG(p) {
  var d = durumCfg[p.durum] || durumCfg.bekliyor;

  var startY = 190;
  var gap    = 56;

  return "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 360 660' width='360' height='660'>"
  + "<defs>"
  + "<filter id='meshBlur' x='-50%' y='-50%' width='200%' height='200%'><feGaussianBlur stdDeviation='50'/></filter>"
  + "<filter id='shadow' x='-50%' y='-50%' width='200%' height='200%'><feDropShadow dx='0' dy='8' stdDeviation='12' flood-color='#0f172a' flood-opacity='0.06'/></filter>"
  + "<linearGradient id='headerGrad' x1='0' y1='0' x2='1' y2='0'><stop offset='0%' stop-color='#1e293b'/><stop offset='100%' stop-color='#0f172a'/></linearGradient>"
  + "</defs>"

  // Arka plan + mesh blur
  + "<rect width='360' height='660' fill='#f0f5fb'/>"
  + "<circle cx='60'  cy='40'  r='200' fill='#e0f2fe' filter='url(#meshBlur)' opacity='0.8'/>"
  + "<circle cx='320' cy='620' r='240' fill='#f1f5f9' filter='url(#meshBlur)' opacity='0.9'/>"
  + "<circle cx='300' cy='200' r='160' fill='#dbeafe' filter='url(#meshBlur)' opacity='0.6'/>"

  // Ana kart
  + "<rect x='12' y='12' width='336' height='636' rx='18' fill='rgba(255,255,255,0.6)' stroke='rgba(255,255,255,0.9)' stroke-width='1' filter='url(#shadow)'/>"

  // Header
  + "<path d='M 12 30 Q 12 12 30 12 L 330 12 Q 348 12 348 30 L 348 98 L 12 98 Z' fill='url(#headerGrad)'/>"
  + "<text x='180' y='50' fill='#ffffff' font-family='sans-serif' font-weight='700' font-size='15' text-anchor='middle' letter-spacing='1.5'>İZİN TALEP FORMU</text>"
  + "<text x='180' y='70' fill='#94a3b8' font-size='10' text-anchor='middle' font-family='monospace' letter-spacing='1'>REF: " + enc(p.id) + "</text>"

  // Avatar
  + "<circle cx='180' cy='120' r='28' fill='#ffffff' filter='url(#shadow)'/>"
  + "<circle cx='180' cy='120' r='24' fill='#f1f5f9'/>"
  + "<path d='M 170 126 A 12 12 0 0 1 190 126' fill='none' stroke='#64748b' stroke-width='2' stroke-linecap='round'/>"
  + "<circle cx='180' cy='114' r='6' fill='#64748b'/>"

  // İsim
  + "<text x='180' y='165' fill='#0f172a' font-family='sans-serif' font-weight='700' font-size='16' text-anchor='middle'>" + enc(p.ad) + "</text>"

  // Ayraç
  + "<rect x='30' y='178' width='300' height='1' fill='rgba(226,232,240,0.6)'/>"

  // Field satırları
  + fieldRow(startY + 0*gap, 'İZİN TÜRÜ',           p.izinTur,  '#0369a1')
  + fieldRow(startY + 1*gap, 'İZİN SÜRESİ',         p.sure,     '#0f172a')
  + fieldRow(startY + 2*gap, 'MINTIKA',              p.mintika,  '#0f172a')
  + fieldRow(startY + 3*gap, 'KURUM',                p.kurum,    '#0f172a')
  + fieldRow(startY + 4*gap, 'BAŞLAMA TARİHİ',       p.baslangic,'#0f172a')
  + fieldRow(startY + 5*gap, 'BİTİŞ TARİHİ',         p.bitis,    '#0f172a')
  + fieldRow(startY + 6*gap, 'MINTIKA MESULÜ ONAYI', p.onayMes,  '#15803d')

  // Durum banner
  + "<rect x='30' y='590' width='300' height='40' rx='10' fill='" + d.warnFill + "' stroke='" + d.warnStroke + "' stroke-width='1.5'/>"
  + "<circle cx='92' cy='610' r='7' fill='" + d.iconFill + "'/>"
  + "<text x='92' y='614' fill='#ffffff' font-family='sans-serif' font-size='9' font-weight='bold' text-anchor='middle'>!</text>"
  + "<text x='190' y='614' fill='" + d.textFill + "' font-family='sans-serif' font-size='13' font-weight='bold' text-anchor='middle' letter-spacing='0.5'>" + enc(d.label) + "</text>"

  // Footer
  + "<rect x='150' y='650' width='60' height='3' rx='2' fill='#cbd5e1'/>"
  + "</svg>";
}

function svgToBlob(svgStr, scale) {
  scale = scale || 2;
  return new Promise(function(resolve, reject) {
    var canvas = document.getElementById('canvas');
    canvas.width = 360 * scale; canvas.height = 640 * scale;
    var ctx = canvas.getContext('2d');
    var img = new Image();
    var blob = new Blob([svgStr], {type:'image/svg+xml'});
    var url = URL.createObjectURL(blob);
    img.onload = function() {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      canvas.toBlob(function(b){ resolve(b); }, 'image/png');
    };
    img.onerror = reject;
    img.src = url;
  });
}

var _blob = null;
function getBlob() {
  if (_blob) return Promise.resolve(_blob);
  return svgToBlob(buildSVG(getParams()), 2).then(function(b){ _blob = b; return b; });
}

var WA_ICON = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg> WhatsApp\'ta Paylaş';
var DL_ICON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> PNG İndir';

function shareWhatsApp() {
  var btn = document.getElementById('btn-wa');
  btn.disabled = true; btn.textContent = 'Hazırlanıyor...';
  getBlob().then(function(blob) {
    var p = getParams();
    var file = new File([blob], 'izin-karti-' + p.id + '.png', {type:'image/png'});
    if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
      return navigator.share({files:[file], title:'İzin Kartı — '+p.ad, text:p.ad+' | '+p.izinTur+' | '+p.baslangic+'–'+p.bitis})
        .then(function(){ setTimeout(function(){ window.close(); }, 500); });
    } else {
      dlBlob(blob, 'izin-karti-' + p.id + '.png');
      setTimeout(function(){
        window.open('https://wa.me/?text='+encodeURIComponent('Mıntıka Sekretarya Mülahazası: '+p.mulahaza),'_blank');
        setTimeout(function(){ window.close(); }, 1000);
      }, 700);
      showToast('PNG indirildi. WhatsApp açılıyor...');
    }
  }).catch(function(e){
    if(e && e.name !== 'AbortError') showToast('Paylaşım iptal edildi.');
  }).finally(function(){ btn.disabled=false; btn.innerHTML=WA_ICON; });
}

function downloadPNG() {
  var btn = document.getElementById('btn-dl');
  btn.disabled = true; btn.textContent = 'Hazırlanıyor...';
  getBlob().then(function(blob){
    dlBlob(blob, 'izin-karti-' + getParams().id + '.png');
    showToast('PNG indirildi ✓');
  }).finally(function(){ btn.disabled=false; btn.innerHTML=DL_ICON; });
}

function dlBlob(blob, name) {
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

window.addEventListener('DOMContentLoaded', function() {
  var p = getParams();
  var pill = document.getElementById('status-pill');
  pill.textContent = {bekliyor:'Bekliyor', onaylandi:'Onaylandı', reddedildi:'Onaylanmadı', onaylanmadi:'Onaylanmadı'}[p.durum] || p.durum;
  pill.className = 'status-pill ' + p.durum;
  if (!/Mobi|Android|iPhone|iPad/.test(navigator.userAgent)) {
    document.getElementById('hint-text').textContent = 'Masaüstü: PNG indirilir + WhatsApp mesajı açılır';
  }
  document.getElementById('svg-container').innerHTML = buildSVG(p);
  setTimeout(function(){ document.getElementById('loading').classList.add('hidden'); }, 250);
});
</script>
</body>
</html>
