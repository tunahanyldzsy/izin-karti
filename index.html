<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İzin Kartı (1080x1920)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e8eef5;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 48px;
    font-family: sans-serif;
  }
  .topbar {
    width: 100%; max-width: 420px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
    opacity: 0; animation: fadeUp 0.4s ease 0.05s forwards;
  }
  .topbar-label { font-family: monospace; font-size: 14px; font-weight: bold; color: #475569; letter-spacing: 0.05em; text-transform: uppercase; }
  .status-pill {
    font-family: monospace; font-size: 14px; font-weight: 700;
    letter-spacing: 0.05em; padding: 6px 14px; border-radius: 24px; border: 2px solid currentColor;
  }
  .status-pill.bekliyor    { color: #b45309; background: rgba(254,243,199,0.9); }
  .status-pill.onaylandi   { color: #15803d; background: rgba(220,252,231,0.9); }
  .status-pill.reddedildi  { color: #b91c1c; background: rgba(254,226,226,0.9); }
  .status-pill.onaylanmadi { color: #b91c1c; background: rgba(254,226,226,0.9); }
  .card-wrap {
    width: 100%; max-width: 420px;
    opacity: 0; animation: fadeUp 0.5s ease 0.15s forwards;
  }
  #svg-container { width: 100%; filter: drop-shadow(0 24px 48px rgba(15,23,42,0.22)); }
  /* Container içindeki SVG, ekran boyutuna göre otomatik ölçeklenir ancak asıl çözünürlüğü korur */
  #svg-container svg { width: 100%; height: auto; display: block; }
  .actions {
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; gap: 14px; margin-top: 24px;
    opacity: 0; animation: fadeUp 0.5s ease 0.35s forwards;
  }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 18px 24px; border-radius: 16px;
    font-family: sans-serif; font-size: 18px; font-weight: 800;
    cursor: pointer; border: none;
    transition: transform 0.15s ease, opacity 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn:disabled { opacity: 0.6; cursor: default; }
  .btn-wa { background: #25D366; color: #fff; box-shadow: 0 6px 20px rgba(37,211,102,0.35); }
  .btn-dl { background: rgba(255,255,255,0.95); color: #0f172a; border: 2px solid rgba(203,213,225,0.9); box-shadow: 0 4px 12px rgba(15,23,42,0.08); }
  .hint { font-family: monospace; font-size: 13px; font-weight: 600; color: #64748b; text-align: center; line-height: 1.6; }
  #loading {
    position: fixed; inset: 0; background: #e8eef5;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; z-index: 100;
    transition: opacity 0.3s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spinner { width: 36px; height: 36px; border: 4px solid #cbd5e1; border-top-color: #475569; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .loading-text { font-family: monospace; font-size: 14px; font-weight: bold; color: #475569; }
  #toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #0f172a; color: #f8fafc;
    font-family: sans-serif; font-size: 16px; font-weight: bold;
    padding: 14px 24px; border-radius: 12px;
    transition: transform 0.3s ease;
    white-space: nowrap; z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <span class="loading-text">Kart hazırlanıyor...</span>
</div>
<div class="topbar">
  <span class="topbar-label">İzin Kartı</span>
  <span id="status-pill" class="status-pill">—</span>
</div>
<div class="card-wrap">
  <div id="svg-container"></div>
</div>
<div class="actions">
  <button class="btn btn-wa" id="btn-wa" onclick="shareWhatsApp()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
    WhatsApp'ta Paylaş
  </button>
  <button class="btn btn-dl" id="btn-dl" onclick="downloadPNG()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    PNG İndir
  </button>
  <p class="hint" id="hint-text">Paylaşmak için WhatsApp butonuna basın</p>
</div>
<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
function getParams() {
  var p = new URLSearchParams(location.search);
  return {
    id:        p.get('id')        || 'TLP-001',
    ad:        p.get('ad')        || 'Ad Soyad',
    izinTur:   p.get('izinTur')   || 'Yıllık İzin',
    sure:      p.get('sure')      || '3 gün',
    mintika:   p.get('mintika')   || '—',
    kurum:     p.get('kurum')     || '—',
    baslangic: p.get('baslangic') || '—',
    bitis:     p.get('bitis')     || '—',
    onayMes:   p.get('onayMes')   || 'Evet',
    durum:     (p.get('durum')    || 'bekliyor').toLowerCase().trim(),
    mulahaza:  p.get('mulahaza')  || '',
  };
}

function enc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

var durumCfg = {
  bekliyor:    { warnFill:'rgba(254,249,195,1)', warnStroke:'rgba(234,179,8,1)',  iconFill:'#b45309', textFill:'#92400e', label:'ONAY BEKLİYOR' },
  onaylandi:   { warnFill:'rgba(220,252,231,1)', warnStroke:'rgba(34,197,94,1)',  iconFill:'#15803d', textFill:'#14532d', label:'ONAYLANDI'     },
  reddedildi:  { warnFill:'rgba(254,226,226,1)', warnStroke:'rgba(239,68,68,1)',  iconFill:'#b91c1c', textFill:'#7f1d1d', label:'ONAYLANMADI'   },
  onaylanmadi: { warnFill:'rgba(254,226,226,1)', warnStroke:'rgba(239,68,68,1)',  iconFill:'#b91c1c', textFill:'#7f1d1d', label:'ONAYLANMADI'   },
};

function fieldRow(y, label, value, valueColor) {
  valueColor = valueColor || '#0f172a';
  return ""
    + "<rect x='60' y='" + y + "' width='960' height='140' rx='24' fill='rgba(255,255,255,0.95)' stroke='rgba(203,213,225,1)' stroke-width='4'/>"
    + "<text x='100' y='" + (y+50) + "' fill='#475569' font-family='sans-serif' font-weight='700' font-size='32' letter-spacing='1'>" + enc(label) + "</text>"
    + "<text x='100' y='" + (y+110) + "' fill='" + valueColor + "' font-family='sans-serif' font-weight='800' font-size='52'>" + enc(value) + "</text>";
}

function buildSVG(p) {
  var d = durumCfg[p.durum] || durumCfg.bekliyor;

  var startY = 600;
  var gap    = 160;

  return "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1080 1920' width='1080' height='1920'>"
  + "<defs>"
  + "<filter id='meshBlur' x='-50%' y='-50%' width='200%' height='200%'><feGaussianBlur stdDeviation='120'/></filter>"
  + "<filter id='shadow' x='-50%' y='-50%' width='200%' height='200%'><feDropShadow dx='0' dy='20' stdDeviation='30' flood-color='#0f172a' flood-opacity='0.12'/></filter>"
  + "<linearGradient id='headerGrad' x1='0' y1='0' x2='1' y2='0'><stop offset='0%' stop-color='#1e293b'/><stop offset='100%' stop-color='#0f172a'/></linearGradient>"
  + "</defs>"

  // Arka plan + mesh blur (1080x1920'ye uyarlandı)
  + "<rect width='1080' height='1920' fill='#f0f5fb'/>"
  + "<circle cx='180' cy='120' r='600' fill='#e0f2fe' filter='url(#meshBlur)' opacity='0.9'/>"
  + "<circle cx='900' cy='1700' r='700' fill='#f1f5f9' filter='url(#meshBlur)' opacity='0.9'/>"
  + "<circle cx='800' cy='500' r='500' fill='#dbeafe' filter='url(#meshBlur)' opacity='0.8'/>"

  // Ana kart (1080x1920 orantılı)
  + "<rect x='30' y='30' width='1020' height='1860' rx='48' fill='rgba(255,255,255,0.75)' stroke='rgba(255,255,255,1)' stroke-width='4' filter='url(#shadow)'/>"

  // Header (Path köşe ovallikleri karta uygun hale getirildi)
  + "<path d='M 30 78 Q 30 30 78 30 L 1002 30 Q 1050 30 1050 78 L 1050 240 L 30 240 Z' fill='url(#headerGrad)'/>"
  + "<text x='540' y='130' fill='#ffffff' font-family='sans-serif' font-weight='800' font-size='56' text-anchor='middle' letter-spacing='3'>İZİN TALEP FORMU</text>"
  + "<text x='540' y='190' fill='#cbd5e1' font-size='36' text-anchor='middle' font-family='monospace' font-weight='700' letter-spacing='2'>REF: " + enc(p.id) + "</text>"

  // Avatar
  + "<circle cx='540' cy='320' r='110' fill='#ffffff' filter='url(#shadow)'/>"
  + "<circle cx='540' cy='320' r='95' fill='#f1f5f9'/>"
  + "<path d='M 500 340 A 40 40 0 0 1 580 340' fill='none' stroke='#475569' stroke-width='8' stroke-linecap='round'/>"
  + "<circle cx='540' cy='295' r='22' fill='#475569'/>"

  // İsim
  + "<text x='540' y='490' fill='#0f172a' font-family='sans-serif' font-weight='900' font-size='68' text-anchor='middle'>" + enc(p.ad) + "</text>"

  // Ayraç
  + "<rect x='60' y='540' width='960' height='4' fill='rgba(203,213,225,0.8)'/>"

  // Field satırları
  + fieldRow(startY + 0*gap, 'İZİN TÜRÜ',            p.izinTur,  '#0369a1')
  + fieldRow(startY + 1*gap, 'İZİN SÜRESİ',          p.sure,     '#0f172a')
  + fieldRow(startY + 2*gap, 'MINTIKA',              p.mintika,  '#0f172a')
  + fieldRow(startY + 3*gap, 'KURUM',                p.kurum,    '#0f172a')
  + fieldRow(startY + 4*gap, 'BAŞLAMA TARİHİ',       p.baslangic,'#0f172a')
  + fieldRow(startY + 5*gap, 'BİTİŞ TARİHİ',         p.bitis,    '#0f172a')
  + fieldRow(startY + 6*gap, 'MINTIKA MESULÜ ONAYI', p.onayMes,  '#15803d')

  // Durum banner
  + "<rect x='60' y='1740' width='960' height='100' rx='24' fill='" + d.warnFill + "' stroke='" + d.warnStroke + "' stroke-width='4'/>"
  + "<circle cx='140' cy='1790' r='28' fill='" + d.iconFill + "'/>"
  + "<text x='140' y='1804' fill='#ffffff' font-family='sans-serif' font-size='36' font-weight='900' text-anchor='middle'>!</text>"
  + "<text x='540' y='1805' fill='" + d.textFill + "' font-family='sans-serif' font-size='44' font-weight='900' text-anchor='middle' letter-spacing='1'>" + enc(d.label) + "</text>"

  // Footer
  + "</svg>";
}

function svgToBlob(svgStr) {
  return new Promise(function(resolve, reject) {
    var canvas = document.getElementById('canvas');
    // Canvas çözünürlüğü tam 1080x1920 olarak kilitlendi. Scale işlemi devreden çıkarıldı.
    canvas.width = 1080;
    canvas.height = 1920;
    var ctx = canvas.getContext('2d');
    var img = new Image();
    var blob = new Blob([svgStr], {type:'image/svg+xml'});
    var url = URL.createObjectURL(blob);
    img.onload = function() {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      canvas.toBlob(function(b){ resolve(b); }, 'image/png');
    };
    img.onerror = reject;
    img.src = url;
  });
}

var _blob = null;
function getBlob() {
  if (_blob) return Promise.resolve(_blob);
  return svgToBlob(buildSVG(getParams())).then(function(b){ _blob = b; return b; });
}

var WA_ICON = '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg> WhatsApp\'ta Paylaş';
var DL_ICON = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> PNG İndir';

function shareWhatsApp() {
  var btn = document.getElementById('btn-wa');
  btn.disabled = true; btn.textContent = 'Hazırlanıyor...';
  getBlob().then(function(blob) {
    var p = getParams();
    var file = new File([blob], 'izin-karti-' + p.id + '.png', {type:'image/png'});
    if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
      return navigator.share({files:[file], title:'İzin Kartı — '+p.ad, text:'Mıntıka Sekretarya Mülahazası: '+p.mulahaza})
        .then(function(){ setTimeout(function(){ window.close(); }, 500); });
    } else {
      dlBlob(blob, 'izin-karti-' + p.id + '.png');
      setTimeout(function(){
        window.open('https://wa.me/?text='+encodeURIComponent('Mıntıka Sekretarya Mülahazası: '+p.mulahaza),'_blank');
        setTimeout(function(){ window.close(); }, 1000);
      }, 700);
      showToast('PNG indirildi. WhatsApp açılıyor...');
    }
  }).catch(function(e){
    if(e && e.name !== 'AbortError') showToast('Paylaşım iptal edildi.');
  }).finally(function(){ btn.disabled=false; btn.innerHTML=WA_ICON; });
}

function downloadPNG() {
  var btn = document.getElementById('btn-dl');
  btn.disabled = true; btn.textContent = 'Hazırlanıyor...';
  getBlob().then(function(blob){
    dlBlob(blob, 'izin-karti-' + getParams().id + '.png');
    showToast('PNG indirildi ✓');
  }).finally(function(){ btn.disabled=false; btn.innerHTML=DL_ICON; });
}

function dlBlob(blob, name) {
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

window.addEventListener('DOMContentLoaded', function() {
  var p = getParams();
  var pill = document.getElementById('status-pill');
  pill.textContent = {bekliyor:'Bekliyor', onaylandi:'Onaylandı', reddedildi:'Onaylanmadı', onaylanmadi:'Onaylanmadı'}[p.durum] || p.durum;
  pill.className = 'status-pill ' + p.durum;
  if (!/Mobi|Android|iPhone|iPad/.test(navigator.userAgent)) {
    document.getElementById('hint-text').textContent = 'Masaüstü: PNG indirilir + WhatsApp mesajı açılır';
  }
  document.getElementById('svg-container').innerHTML = buildSVG(p);
  setTimeout(function(){ document.getElementById('loading').classList.add('hidden'); }, 250);
});
</script>
</body>
</html>
